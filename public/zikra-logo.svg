<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Zikra — Kelajak Sari">
  <defs>
    <!-- ZIKRA matni uchun ko'p rangli gradient (yashil → ko'k → binafsha → oltin) -->
    <linearGradient id="zk-text" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#1F9E6E"/>
      <stop offset="0.28" stop-color="#127FB0"/>
      <stop offset="0.55" stop-color="#3E3FA6"/>
      <stop offset="0.78" stop-color="#6C3FA0"/>
      <stop offset="1" stop-color="#C49A2E"/>
    </linearGradient>
    <!-- KELAJAK SARI uchun gradient -->
    <linearGradient id="zk-sub" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1F9E6E"/>
      <stop offset="0.5" stop-color="#3E3FA6"/>
      <stop offset="1" stop-color="#9A3F86"/>
    </linearGradient>
    <!-- Metall (kumush) halqa uchun gradient -->
    <linearGradient id="zk-silver" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#fbfbfc"/>
      <stop offset="0.45" stop-color="#c4c4cb"/>
      <stop offset="0.6" stop-color="#9a9aa2"/>
      <stop offset="1" stop-color="#d8d8de"/>
    </linearGradient>
  </defs>

  <!-- Oq fon doira -->
  <circle cx="256" cy="256" r="252" fill="#ffffff"/>

  <!-- Kumush ikki halqa -->
  <circle cx="256" cy="256" r="249" fill="none" stroke="url(#zk-silver)" stroke-width="7"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#zk-silver)" stroke-width="3.5"/>

  <!-- ZIKRA -->
  <text x="256" y="258" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', 'Times New Roman', serif"
        font-weight="800" font-size="158" letter-spacing="2"
        fill="url(#zk-text)">ZIKRA</text>

  <!-- KELAJAK SARI -->
  <text x="256" y="340" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-weight="700" font-size="50" letter-spacing="4"
        fill="url(#zk-sub)">KELAJAK SARI</text>
</svg>
