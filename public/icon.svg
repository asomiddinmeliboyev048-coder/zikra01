<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Zikra">
  <defs>
    <!-- Asosiy teal -> mint -> och sariq gradient (pastki-chapdan yuqori-o'ngga) -->
    <linearGradient id="zk-main" x1="0.12" y1="0.95" x2="0.95" y2="0.08">
      <stop offset="0" stop-color="#0e5f57"/>
      <stop offset="0.38" stop-color="#2f9f8d"/>
      <stop offset="0.72" stop-color="#8ad5bb"/>
      <stop offset="1" stop-color="#e4ec9e"/>
    </linearGradient>
    <linearGradient id="zk-facet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0b463f" stop-opacity="0.28"/>
    </linearGradient>
    <clipPath id="zk-clip">
      <path d="M128 150 L384 150 L384 214 L236 298 L384 298 L384 362 L128 362 L128 298 L276 214 L128 214 Z"/>
    </clipPath>
  </defs>

  <!-- Oq yumaloq fon (app icon uslubi) -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="#ffffff"/>

  <!-- Z asosiy shakli -->
  <path d="M128 150 L384 150 L384 214 L236 298 L384 298 L384 362 L128 362 L128 298 L276 214 L128 214 Z" fill="url(#zk-main)"/>

  <!-- Facet (kristall) effektlari -->
  <g clip-path="url(#zk-clip)">
    <polygon points="256,110 430,110 430,402 256,402" fill="url(#zk-facet)" opacity="0.55"/>
    <polygon points="128,250 300,150 300,402 128,402" fill="#0b463f" opacity="0.12"/>
    <polygon points="384,150 300,214 384,214" fill="#eef2b0" opacity="0.6"/>
    <polygon points="128,362 236,298 300,298 190,362" fill="#0b463f" opacity="0.15"/>
  </g>
</svg>
